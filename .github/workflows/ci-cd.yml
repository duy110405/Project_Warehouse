name: WMS CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: BUILD BACKEND (NẰM TRONG THƯ MỤC 'backend')
  # ==========================================
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    
    # MỚI THÊM: Chỉ định mặc định mọi lệnh trong Job này đều chạy ở folder backend
    defaults:
      run:
        working-directory: ./wms-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

  # ==========================================
  # JOB 2: BUILD FRONTEND (NẰM TRONG THƯ MỤC 'frontend')
  # ==========================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    # MỚI THÊM: Chỉ định mặc định mọi lệnh trong Job này đều chạy ở folder frontend
    defaults:
      run:
        working-directory: ./wms-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json' # Trỏ đúng chỗ để cache NPM

      - name: Install Dependencies
        run: npm install

      - name: Build project (Vite)
        run: npm run build

  # ==========================================
  # JOB 3: DEPLOY
  # ==========================================
  deploy:
    name: Deploy to Server
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Deploy Placeholder
        run: |
          echo "🚀 Build thành công cả Front & Back trong thư mục con!"
