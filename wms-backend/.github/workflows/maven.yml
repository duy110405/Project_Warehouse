name: Spring Boot CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Lay code ve may chu ao
        uses: actions/checkout@v4

      - name: Cai dat Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Kiem tra loi code (Build Maven)
        run: mvn clean install -DskipTests